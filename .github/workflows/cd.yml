name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  REGISTRY: fabriziocaffeacr.azurecr.io

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.AKS_KUBECONFIG }}" > ~/.kube/config

    - name: Update Backend
      run: |
        kubectl set image deployment/backend \
        backend=$REGISTRY/backend:${{ github.event.workflow_run.head_sha }}

    - name: Update Frontend
      run: |
        kubectl set image deployment/frontend \
        frontend=$REGISTRY/frontend:${{ github.event.workflow_run.head_sha }}

    - name: Wait Backend
      run: kubectl rollout status deployment/backend

    - name: Wait Frontend
      run: kubectl rollout status deployment/frontend