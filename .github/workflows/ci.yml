name: CI

on:
  push:
    branches:
      - main

env:
  REGISTRY: fabriziocaffeacr.azurecr.io

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login ACR
      uses: docker/login-action@v3
      with:
        registry: fabriziocaffeacr.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Backend
      run: |
        docker build \
          -t $REGISTRY/backend:${{ github.sha }} \
          ./backend

    - name: Build Frontend
      run: |
        docker build \
          -t $REGISTRY/frontend:${{ github.sha }} \
          ./frontend

    - name: Push Backend
      run: docker push $REGISTRY/backend:${{ github.sha }}

    - name: Push Frontend
      run: docker push $REGISTRY/frontend:${{ github.sha }}