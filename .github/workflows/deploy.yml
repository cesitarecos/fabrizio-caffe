name: Deploy to AKS

on:
  push:
    branches:
      - main

env:
  REGISTRY: fabriziocaffeacr.azurecr.io

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: fabriziocaffeacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t $REGISTRY/backend:${{ github.sha }} ./backend

      - name: Build Frontend
        run: |
          docker build -t $REGISTRY/frontend:${{ github.sha }} ./frontend

      - name: Push Backend
        run: |
          docker push $REGISTRY/backend:${{ github.sha }}

      - name: Push Frontend
        run: |
          docker push $REGISTRY/frontend:${{ github.sha }}

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.AKS_KUBECONFIG }}" > ~/.kube/config

      - name: Update Backend
        run: |
          kubectl set image deployment/backend \
            backend=$REGISTRY/backend:${{ github.sha }}

      - name: Update Frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=$REGISTRY/frontend:${{ github.sha }}

      - name: Wait Backend
        run: |
          kubectl rollout status deployment/backend

      - name: Wait Frontend
        run: |
          kubectl rollout status deployment/frontend