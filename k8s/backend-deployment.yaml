apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: fabriziocaffeacr.azurecr.io/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: DB_SERVER
          value: "57.156.67.51"
        - name: DB_PORT
          value: "1433"
        - name: DB_DATABASE
          value: "FabrizioCaffeDB"
        - name: DB_USER
          value: "sa"
        - name: DB_PASSWORD
          value: "Tibug@mer500"
        - name: JWT_SECRET
          value: "abcdefghijklmnopqrstuvwxyz"
        - name: JWT_EXPIRES_IN
          value: "8h"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP